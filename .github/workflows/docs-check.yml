name: docs-check

on:
  pull_request:
    paths:
      - "content/**"
      - "scripts/docs-check.mjs"

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/docs-check.mjs
