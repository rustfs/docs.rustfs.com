<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="RustFS technology value pyramid for manufacturing: from technology foundation up to strategic value.">
  <style>
    .detail { fill: #334155; }
    .divider { stroke: #e2e8f0; }
    @media (prefers-color-scheme: dark) {
      .detail { fill: #cbd5e1; }
      .divider { stroke: #334155; }
    }
  </style>

  <!-- Foundation (bottom) -->
  <polygon points="80,330 380,330 430,430 30,430" fill="#0f2a6b"/>
  <text x="230" y="386" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Technology Foundation</text>

  <!-- Scenario Capabilities -->
  <polygon points="130,230 330,230 380,330 80,330" fill="#38bdf8"/>
  <text x="230" y="287" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Scenario Capabilities</text>

  <!-- Quantifiable Benefits -->
  <polygon points="180,130 280,130 330,230 130,230" fill="#bae6fd"/>
  <text x="230" y="188" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Quantifiable Benefits</text>

  <!-- Strategic Value (apex) -->
  <polygon points="230,34 280,130 180,130" fill="#a7f3d0"/>
  <text x="230" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Strategic Value</text>

  <!-- Connector line -->
  <line x1="450" y1="40" x2="450" y2="430" class="divider" stroke-width="1"/>

  <!-- Strategic Value details -->
  <text x="482" y="86" font-size="13" class="detail">
    <tspan x="482" dy="0" font-weight="600">Strategic value</tspan>
    <tspan x="482" dy="18">Industry 4.0 digital foundation · Flexible</tspan>
    <tspan x="482" dy="17">manufacturing data hub · Digital twin core</tspan>
  </text>

  <!-- Quantifiable Benefits details -->
  <text x="482" y="176" font-size="13" class="detail">
    <tspan x="482" dy="0" font-weight="600">Quantifiable benefits</tspan>
    <tspan x="482" dy="18">Zero production-line data loss (RTO &lt; 15 min)</tspan>
    <tspan x="482" dy="17">Storage cost −55% (TCO) · Process +70% (MES/SCADA)</tspan>
  </text>

  <!-- Scenario Capabilities details -->
  <text x="482" y="276" font-size="13" class="detail">
    <tspan x="482" dy="0" font-weight="600">Scenario capabilities</tspan>
    <tspan x="482" dy="18">Million-sensor data lake (TB/s writes)</tspan>
    <tspan x="482" dy="17">Global supply-chain sync (&lt; 1 s) · Frame-level AI QC</tspan>
  </text>

  <!-- Technology Foundation details -->
  <text x="482" y="376" font-size="13" class="detail">
    <tspan x="482" dy="0" font-weight="600">Technology foundation</tspan>
    <tspan x="482" dy="18">∞ Infinite scaling · Eleven-nines reliability</tspan>
    <tspan x="482" dy="17">Military-grade erasure coding · 2B files located in 1 s</tspan>
  </text>
</svg>
